const SALT = "Fv2poR0oTQwhyyoAaqNslQ==", IV = "xYgSIjICFvzHTnv3", ITER = 310000;
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(pass) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass),
    "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(SALT), iterations:ITER, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(IV)}, key, b64(PAYLOAD));
  return new TextDecoder().decode(plain);
}
async function attempt(pass, silent) {
  try {
    const html = await unlock(pass);
    sessionStorage.setItem("abdash", pass);
    document.open(); document.write(html); document.close();
  } catch (e) {
    sessionStorage.removeItem("abdash");
    if (!silent) document.getElementById("err").textContent = "合言葉がちがうみたい…🥲";
  }
}
document.getElementById("f").addEventListener("submit", ev => {
  ev.preventDefault();
  attempt(document.getElementById("pw").value, false);
});
const saved = sessionStorage.getItem("abdash");
if (saved) attempt(saved, true);
